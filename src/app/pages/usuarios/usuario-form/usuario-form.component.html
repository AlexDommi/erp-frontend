<div class="container">

  <mat-card>

    <mat-card-header>
      <mat-card-title>
        @if (!id) {
          Nuevo Usuario
        } @else {
          Editar Usuario
          <span class="usuario-nombre">{{ form.get('email')?.value }}</span>
        }
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" class="form">

  <mat-form-field appearance="outline">
    <mat-label>Email</mat-label>

    <input matInput formControlName="email" required />

    @if (form.get('email')?.invalid && form.get('email')?.touched) {
      <mat-error>{{ errorMessage() }}</mat-error>
    }
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Password</mat-label>

    <input matInput formControlName="password" [type]="hide() ? 'password' : 'text'" />

    <button mat-icon-button matSuffix (click)="clickEvent($event)">
      <mat-icon>{{hide() ? 'visibility_off' : 'visibility'}}</mat-icon>
    </button>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Empresa</mat-label>
    <input matInput formControlName="empresaId" />
  </mat-form-field>
</form>
    </mat-card-content>

    <mat-card-actions align="end">
      <button mat-button (click)="cancelar()">Cancelar</button>
      <button mat-flat-button (click)="guardar()" color="primary">Guardar</button>
    </mat-card-actions>

  </mat-card>

</div>
