<div class="container">

  <mat-card>

    <mat-card-header>
      <mat-card-title>
        @if (!id) {
          Nuevo Usuario
        } @else {
          Editar Usuario
          <span class="usuario-nombre">{{ form.get('email')?.value }}</span>
        }
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>

      <!-- 🔥 TABS -->
      <mat-tab-group (selectedIndexChange)="onTabChange($event)">

        <!-- ================= DATOS ================= -->
        <mat-tab label="Datos">
          <form [formGroup]="form" class="form">

            <mat-form-field appearance="outline">
              <mat-label>Email</mat-label>
              <input matInput formControlName="email" required />

              @if (form.get('email')?.invalid && form.get('email')?.touched) {
                <mat-error>{{ errorMessage() }}</mat-error>
              }
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Password</mat-label>

              <input matInput formControlName="password"
                    [type]="hide() ? 'password' : 'text'" />

              <button mat-icon-button matSuffix (click)="clickEvent($event)">
                <mat-icon>{{hide() ? 'visibility_off' : 'visibility'}}</mat-icon>
              </button>
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Empresa</mat-label>
              <input matInput formControlName="empresaId" />
            </mat-form-field>

          </form>
        </mat-tab>

        <!-- ================= ROLES ================= -->
        <mat-tab label="Roles">

          <div class="roles-container">

            <h3>Asignar Roles</h3>

            <label *ngFor="let rol of roles">
              <input
                type="checkbox"
                [checked]="rolesUsuario.includes(rol.rolId)"
                (change)="toggleRol(rol.rolId)"
              />
              {{ rol.rolNombre }}
            </label>

          </div>

        </mat-tab>

        <!-- ================= PERMISOS ================= -->
        <mat-tab label="Permisos">

          <!-- 🚫 BLOQUEO -->
          <div *ngIf="rolesUsuario.length === 0" class="bloqueo">
            ⚠️ Primero asigna al menos un rol
          </div>

          <!-- ✅ CONTENIDO -->
          <div *ngIf="rolesUsuario.length > 0">

            <div *ngFor="let modulo of permisosAgrupados | keyvalue">

              <h4>{{ modulo.key | uppercase }}</h4>

              <div class="acciones">
                <label *ngFor="let permiso of modulo.value">
                  <input
                    type="checkbox"
                    [checked]="isChecked(permiso.id)"
                    (change)="togglePermiso(permiso.id)"
                  />
                  {{ permiso.accion }}
                </label>
              </div>

            </div>

          </div>

        </mat-tab>

      </mat-tab-group>

    </mat-card-content>

    <mat-card-actions align="end">
      <button mat-button (click)="cancelar()">Cancelar</button>
      <button mat-flat-button (click)="guardar()" color="primary">Guardar</button>
    </mat-card-actions>

  </mat-card>

</div>
